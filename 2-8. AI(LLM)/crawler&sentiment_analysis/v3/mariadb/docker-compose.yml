services:
  mariadb:
    image: mariadb:10.5.10
    container_name: mariadb-main
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_DATABASE=connect_test_db
      - MYSQL_USER=appuser
      - MYSQL_PASSWORD=appuserpass
      - TZ=Asia/Seoul  # [추가] 시스템 시간대 설정
    # [추가] MariaDB 내부 시간대도 강제로 +09:00(KST)로 설정
    command: --default-time-zone='+09:00'
    volumes:
      - ./mariadb_confs/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./mariadb_confs/mariadb_main.cnf:/etc/mysql/mariadb.cnf
      - ./mariadb_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - app-network

networks:
  app-network:
    name: app-network
    driver: bridge
