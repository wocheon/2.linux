version: '3.3'

services:
  # --- Solr Cloud Nodes (2 Nodes) ---
  solr1:
    image: solr:9.8
    container_name: solr1
    network_mode: "host" # 호스트 네트워크 사용 시 포트 충돌 주의!
    user: 8983:8983  # 호스트의 UID:GID로 실행됨
    restart: always
    environment:
      - TZ=Asia/Seoul
      - SOLR_HOST=10.0.1191
      - SOLR_PORT=8983
      # 로컬 VM 내 /etc/hosts 파일에 정의된 ZooKeeper 호스트명과 포트
      - ZK_HOST=zoo1:2181,zoo2:2182,zoo3:2183
      # JAVA HEAP 지정 (Xms : 최초 할당, Xmx : 최대 크기)
      - SOLR_JAVA_MEM=-Xms12g -Xmx12g
      # [핵심] Nori 등 분석기 모듈, SQL 쿼리용 모듈 자동 로딩
      - SOLR_MODULES=analysis-extras,sql,gcs-repository
      # JVM Security Manager에게 해당 경로 접근을 허용하라고 지시
      - SOLR_ALLOWPATHS=/var/solr/backups
      # ADC 참고용 환경 변수
      - GOOGLE_APPLICATION_CREDENTIALS=/var/solr/data/gcp-adc-key.json
      # GCS Backup - XML 내의 ${solr.gcs.xxx} 변수에 버킷 명 입력
      - SOLR_OPTS=-Dsolr.gcs.bucket=gcp-solr-gcs-backup-bucket
    volumes:
      # Solr Conifg 파일 Mount
      - ./configs/solr.xml:/opt/solr-9.8.1/server/solr/solr.xml
      # _Default Conifg 파일 Mount
      - ./configs/solrconfig_edit.xml:/opt/solr/server/solr/configsets/_default/conf/solrconfig.xml
      # ADC용 키 Mount - 읽기 전용으로 마운트
      - ./configs/gcp-solr-gcs-backup_SA.json:/var/solr/data/gcp-adc-key.json:ro
      # Data Dir Setting
      - ./solr_data/solr1_data:/var/solr
      # Backup Dir Setting
      - ./backups:/var/solr/data/backups
    command: solr -c -f -p 8983 # 실행 시 -p 로 포트 지정


  solr2:
    image: solr:9.8
    container_name: solr2
    network_mode: "host" # 호스트 네트워크 사용 시 포트 충돌 주의!
    user: 8983:8983  # 호스트의 UID:GID로 실행됨
    restart: always
    environment:
      - TZ=Asia/Seoul
      - SOLR_HOST=10.0.1191
      - SOLR_PORT=8984
      # 로컬 VM 내 /etc/hosts 파일에 정의된 ZooKeeper 호스트명과 포트
      - ZK_HOST=zoo1:2181,zoo2:2182,zoo3:2183
      # JAVA HEAP 지정 (Xms : 최초 할당, Xmx : 최대 크기)
      - SOLR_JAVA_MEM=-Xms12g -Xmx12g
      # [핵심] Nori 등 분석기 모듈, SQL 쿼리용 모듈 자동 로딩
      - SOLR_MODULES=analysis-extras,sql,gcs-repository
      # JVM Security Manager에게 해당 경로 접근을 허용하라고 지시
      - SOLR_ALLOWPATHS=/var/solr/backups
      # ADC 참고용 환경 변수
      - GOOGLE_APPLICATION_CREDENTIALS=/var/solr/data/gcp-adc-key.json
      # GCS Backup - XML 내의 ${solr.gcs.xxx} 변수에 버킷 명 입력
      - SOLR_OPTS=-Dsolr.gcs.bucket=gcp-solr-gcs-backup-bucket
    volumes:
      # Solr Conifg 파일 Mount
      - ./configs/solr.xml:/opt/solr-9.8.1/server/solr/solr.xml
      # _Default Conifg 파일 Mount
      - ./configs/solrconfig_edit.xml:/opt/solr/server/solr/configsets/_default/conf/solrconfig.xml
      # ADC용 키 Mount - 읽기 전용으로 마운트
      - ./configs/gcp-solr-gcs-backup_SA.json:/var/solr/data/gcp-adc-key.json:ro
      # Data Dir Setting
      - ./solr_data/solr2_data:/var/solr
      # Backup Dir Setting
      - ./backups:/var/solr/data/backups
    command: solr -c -f -p 8984 # 실행 시 -p 로 포트 지정
